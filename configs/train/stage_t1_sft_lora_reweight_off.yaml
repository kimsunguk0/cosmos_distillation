stage_name: stage_a
epochs: 1.0
batch_size: 1
max_length: 4096
bf16: true
gradient_checkpointing: true
learning_rate: 1.0e-4

# Clean GT-SFT baseline that breaks the old pure-LM trajectory-body plateau.
# This is the main-repo port of the Claude reweight-off Phase 1 recipe.
# Keep teacher/KD/hidden/aux losses off so this isolates the GT traj CE path.

data_view:
  prompt_mode: joint
  target_mode: joint
  teacher_pair_target: false
  enable_teacher_view: false
  enable_action_aux: false

loss_weights:
  gt_cot_loss: 0.1
  teacher_cot_loss: 0.0
  teacher_topk_kd_loss: 0.0
  traj_loss: 1.0
  teacher_traj_loss: 0.0
  teacher_traj_topk_kd_loss: 0.0
  teacher_traj_hidden_align_loss: 0.0
  output_format_loss: 0.25
  meta_action_loss: 0.0
  traj_aux_loss: 0.0
  traj_aux_xyz_loss: 0.0
  traj_aux_final_loss: 0.0
  traj_xyz_loss: 0.0
  traj_delta_loss: 0.0
  traj_final_loss: 0.0

traj_token_reweighting:
  enabled: false
  power: 0.5
  min_weight: 0.5
  max_weight: 2.5

decode_eval:
  enabled: false
