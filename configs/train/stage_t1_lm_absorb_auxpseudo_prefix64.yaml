stage_name: stage_a
epochs: 1.0
batch_size: 1
max_length: 4096
bf16: true
learning_rate: 0.00001

data_view:
  prompt_mode: joint
  target_mode: joint
  teacher_pair_target: true
  enable_teacher_view: false
  enable_action_aux: false
  teacher_traj_cache_dir: /data/teacher_cache/traj15

loss_weights:
  gt_cot_loss: 0.25
  teacher_cot_loss: 0.0
  teacher_topk_kd_loss: 0.50
  traj_loss: 0.10
  teacher_traj_topk_kd_loss: 0.10
  teacher_traj_hidden_align_loss: 0.0
  output_format_loss: 0.25
  meta_action_loss: 0.0
  traj_aux_loss: 0.0
  traj_aux_xyz_loss: 0.0
  traj_aux_final_loss: 0.0
  traj_xyz_loss: 0.0
  traj_delta_loss: 0.0
  traj_final_loss: 0.0
  traj_aux_guided_kd_loss: 0.25
  traj_aux_pseudo_ce_loss: 1.0

traj_decode_reg:
  short_horizon_steps: 8
  short_horizon_weight: 1.0

traj_aux_interface:
  num_buckets: 4
  normalize_targets: true
  tanh_bound: 3.0
  huber_delta: 1.0
  decode_tanh_scale: 0.5
  decode_edge_margin: 128
  decode_prior_sigma: 64.0

optimization:
  freeze_all_but_traj_aux_head: false
  freeze_traj_aux_head: true

curriculum:
  traj_body_prefix_tokens: 64

decode_eval:
  enabled: false
