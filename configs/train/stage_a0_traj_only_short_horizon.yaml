stage_name: stage_a
epochs: 1.0
max_length: 4096
bf16: true
gradient_checkpointing: true
learning_rate: 1.0e-4

data_view:
  prompt_mode: traj_only
  target_mode: traj_only
  enable_teacher_view: false
  enable_action_aux: false

loss_weights:
  gt_cot_loss: 0.0
  teacher_cot_loss: 0.0
  teacher_topk_kd_loss: 0.0
  traj_loss: 1.0
  traj_xyz_loss: 0.30
  traj_delta_loss: 0.12
  traj_final_loss: 0.05
  output_format_loss: 0.25
  meta_action_loss: 0.0
  feature_align_loss: 0.0

traj_token_reweighting:
  enabled: true
  power: 0.5
  min_weight: 0.5
  max_weight: 2.5

traj_decode_reg:
  short_horizon_steps: 20
  short_horizon_weight: 3.0

decode_eval:
  enabled: true
  split: val
  num_samples: 8
  max_new_tokens: 140
  prompt_mode: traj_only
  target_mode: traj_only
  metric_name: anti_collapse_score
