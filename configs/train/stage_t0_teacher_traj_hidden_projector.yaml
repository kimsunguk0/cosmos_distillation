stage_name: stage_a
epochs: 1.0
max_length: 4096
bf16: true
gradient_checkpointing: true
learning_rate: 1.0e-4

data_view:
  prompt_mode: traj_only
  target_mode: traj_only
  enable_teacher_view: false
  enable_action_aux: false
  teacher_traj_cache_dir: /data/teacher_cache/traj15

loss_weights:
  gt_cot_loss: 0.0
  teacher_cot_loss: 0.0
  teacher_topk_kd_loss: 0.0
  traj_loss: 0.0
  teacher_traj_loss: 0.15
  teacher_traj_topk_kd_loss: 0.5
  teacher_traj_hidden_align_loss: 0.02
  traj_xyz_loss: 0.0
  traj_delta_loss: 0.0
  traj_final_loss: 0.0
  output_format_loss: 0.25
  meta_action_loss: 0.0
  feature_align_loss: 0.0

traj_token_reweighting:
  enabled: false

decode_eval:
  enabled: true
  split: val
  num_samples: 8
  max_new_tokens: 140
  prompt_mode: traj_only
  target_mode: traj_only
  metric_name: anti_collapse_score
