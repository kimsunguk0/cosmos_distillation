stage_name: stage_a
epochs: 1.0
batch_size: 1
max_length: 4096
bf16: true
gradient_checkpointing: true
learning_rate: 5.0e-5

# B1d + scheduled sampling smoke.
# Base checkpoint: outputs/checkpoints/stage_b1d_horizon_teacher_kd_from_b0/step_000754
# The loss stays identical to B1d; only train-time trajectory body inputs are
# partially replaced by current-model predictions from <i0>~<i2999>.

data_view:
  prompt_mode: joint
  target_mode: joint
  teacher_pair_target: false
  enable_teacher_view: false
  enable_action_aux: false
  teacher_traj_cache_dir: /data/teacher_cache/traj15

loss_weights:
  gt_cot_loss: 0.1
  teacher_cot_loss: 0.0
  teacher_topk_kd_loss: 0.0
  traj_loss: 1.0
  teacher_traj_loss: 0.0
  teacher_traj_topk_kd_loss: 0.20
  teacher_traj_hidden_align_loss: 0.0
  output_format_loss: 0.25
  meta_action_loss: 0.0
  traj_aux_loss: 0.0
  traj_aux_xyz_loss: 0.0
  traj_aux_final_loss: 0.0
  traj_xyz_loss: 0.0
  traj_delta_loss: 0.0
  traj_final_loss: 0.0

scheduled_sampling:
  enabled: true
  p: 0.25
  replacement_vocab: "<i0>~<i2999>"

traj_token_reweighting:
  enabled: false

decode_eval:
  enabled: false
