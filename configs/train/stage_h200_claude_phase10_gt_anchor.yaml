stage_name: stage_a
epochs: 1.0
batch_size: 1
max_length: 4096
bf16: true
gradient_checkpointing: true
learning_rate: 2.0e-5

# H200 comparison config: keep the hard target explicitly GT-anchored, but port
# the rest of Claude's successful token-path recipe.
#
# Differences vs the faithful config:
# - teacher_pair_target: false
# - `gt_cot_loss` and `traj_loss` stay on human/GT hard targets
# - teacher trajectory/text signals remain auxiliary via separate CE/KD losses
#
# This run answers whether Claude's gains came from the teacher-pair hard target
# itself, or from the surrounding KD/hidden/reweight/SS stack.

data_view:
  prompt_mode: joint
  target_mode: joint
  teacher_pair_target: false
  enable_teacher_view: false
  enable_action_aux: false
  teacher_traj_cache_dir: /data/teacher_cache/traj15

loss_weights:
  gt_cot_loss: 0.05
  teacher_cot_loss: 0.0
  teacher_topk_kd_loss: 0.30
  traj_loss: 0.70
  teacher_traj_loss: 0.50
  teacher_traj_topk_kd_loss: 0.40
  teacher_traj_hidden_align_loss: 0.05
  output_format_loss: 0.05
  meta_action_loss: 0.0
  traj_aux_loss: 0.0
  traj_aux_xyz_loss: 0.0
  traj_aux_final_loss: 0.0
  traj_xyz_loss: 0.0
  traj_delta_loss: 0.0
  traj_final_loss: 0.0

traj_hidden_bridge:
  shared_size: 512
  cosine_weight: 0.8
  mse_weight: 0.2

traj_token_reweighting:
  enabled: true
  power: 0.5
  min_weight: 0.5
  max_weight: 2.5

scheduled_sampling:
  enabled: true
  p: 0.25
  replacement_vocab: "<i0>~<i2999>"

decode_eval:
  enabled: false
