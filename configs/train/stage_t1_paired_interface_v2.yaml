stage_name: stage_a
epochs: 1.0
max_length: 4096
bf16: true
gradient_checkpointing: true
learning_rate: 5.0e-5

data_view:
  prompt_mode: joint
  target_mode: joint
  teacher_pair_target: true
  enable_teacher_view: false
  enable_action_aux: false
  teacher_traj_cache_dir: /data/teacher_cache/traj15

loss_weights:
  gt_cot_loss: 0.25
  teacher_cot_loss: 0.0
  teacher_topk_kd_loss: 0.50
  traj_loss: 0.10
  teacher_traj_topk_kd_loss: 0.10
  teacher_traj_hidden_align_loss: 0.0
  traj_aux_loss: 1.00
  traj_aux_xyz_loss: 0.10
  traj_aux_final_loss: 0.05
  traj_xyz_loss: 0.0
  traj_delta_loss: 0.0
  traj_final_loss: 0.0
  output_format_loss: 0.25
  meta_action_loss: 0.0
  feature_align_loss: 0.0

traj_aux_interface:
  num_buckets: 4

traj_token_reweighting:
  enabled: false

decode_eval:
  enabled: true
  split: val
  num_samples: 8
  max_new_tokens: 220
  prompt_mode: joint
  target_mode: joint
  metric_name: anti_collapse_score
