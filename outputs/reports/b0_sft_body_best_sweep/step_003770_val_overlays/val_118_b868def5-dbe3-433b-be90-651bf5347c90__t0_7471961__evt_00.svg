<text x='610' y='42' font-size='13' font-family='monospace' fill='#111'>tags:</text>
<text x='610' y='60' font-size='11' font-family='monospace' fill='#333'>G_teacher_also_far_from_gt,</text>
<text x='610' y='75' font-size='11' font-family='monospace' fill='#333'>E_long_horizon_divergence</text>
<text x='610' y='100' font-size='13' font-family='monospace' fill='#111'>student:</text>
<text x='610' y='118' font-size='11' font-family='monospace' fill='#333'>Maintain speed while keeping a safe distance</text>
<text x='610' y='133' font-size='11' font-family='monospace' fill='#333'>from the pedestrians and the car parked on the</text>
<text x='610' y='148' font-size='11' font-family='monospace' fill='#333'>right.</text>
<text x='610' y='173' font-size='13' font-family='monospace' fill='#111'>human:</text>
<text x='610' y='191' font-size='11' font-family='monospace' fill='#333'>Steer left to pass the garbage truck parking</text>
<text x='610' y='206' font-size='11' font-family='monospace' fill='#333'>on the same lane.</text>
<text x='610' y='231' font-size='13' font-family='monospace' fill='#111'>teacher:</text>
<text x='610' y='249' font-size='11' font-family='monospace' fill='#333'>Change to the left lane due to a stopped</text>
<text x='610' y='264' font-size='11' font-family='monospace' fill='#333'>garbage truck blocking the right lane, then</text>
<text x='610' y='279' font-size='11' font-family='monospace' fill='#333'>merge back right after clearing it, because</text>
<text x='610' y='294' font-size='11' font-family='monospace' fill='#333'>this provides a safe path past the obstruction</text>
<text x='610' y='309' font-size='11' font-family='monospace' fill='#333'>and workers while maintaining traffic flow</text>
<text x='610' y='324' font-size='11' font-family='monospace' fill='#333'>under a green signal and checking for gaps in</text>
<text x='610' y='339' font-size='11' font-family='monospace' fill='#333'>opposing traffic; after clearing, return to</text>
<text x='610' y='354' font-size='11' font-family='monospace' fill='#333'>the right lane for normal travel.</text>
