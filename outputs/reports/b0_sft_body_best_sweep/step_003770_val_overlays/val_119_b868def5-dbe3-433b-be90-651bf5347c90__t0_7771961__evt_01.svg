<text x='610' y='158' font-size='13' font-family='monospace' fill='#111'>human:</text>
<text x='610' y='176' font-size='11' font-family='monospace' fill='#333'>Strong deceleration to maintain a safe</text>
<text x='610' y='191' font-size='11' font-family='monospace' fill='#333'>distance from the garbage truck and workers on</text>
<text x='610' y='206' font-size='11' font-family='monospace' fill='#333'>the same lane.</text>
<text x='610' y='231' font-size='13' font-family='monospace' fill='#111'>teacher:</text>
<text x='610' y='249' font-size='11' font-family='monospace' fill='#333'>Lane change to the left due to a stopped</text>
<text x='610' y='264' font-size='11' font-family='monospace' fill='#333'>garbage truck blocking our lane ahead, then</text>
<text x='610' y='279' font-size='11' font-family='monospace' fill='#333'>merge back right after clearing it, ensuring</text>
<text x='610' y='294' font-size='11' font-family='monospace' fill='#333'>safe gap selection with any opposing traffic</text>
<text x='610' y='309' font-size='11' font-family='monospace' fill='#333'>and watching nearby workers.</text>
