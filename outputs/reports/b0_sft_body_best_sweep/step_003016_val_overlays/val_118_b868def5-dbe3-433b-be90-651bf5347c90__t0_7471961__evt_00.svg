<text x='610' y='130' font-size='13' font-family='monospace' fill='#111'>student:</text>
<text x='610' y='148' font-size='11' font-family='monospace' fill='#333'>Steer left to pass the car and workers in the</text>
<text x='610' y='163' font-size='11' font-family='monospace' fill='#333'>same lane.</text>
<text x='610' y='188' font-size='13' font-family='monospace' fill='#111'>human:</text>
<text x='610' y='206' font-size='11' font-family='monospace' fill='#333'>Steer left to pass the garbage truck parking</text>
<text x='610' y='221' font-size='11' font-family='monospace' fill='#333'>on the same lane.</text>
<text x='610' y='246' font-size='13' font-family='monospace' fill='#111'>teacher:</text>
<text x='610' y='264' font-size='11' font-family='monospace' fill='#333'>Change to the left lane due to a stopped</text>
<text x='610' y='279' font-size='11' font-family='monospace' fill='#333'>garbage truck blocking the right lane, then</text>
<text x='610' y='294' font-size='11' font-family='monospace' fill='#333'>merge back right after clearing it, because</text>
<text x='610' y='309' font-size='11' font-family='monospace' fill='#333'>this provides a safe path past the obstruction</text>
<text x='610' y='324' font-size='11' font-family='monospace' fill='#333'>and workers while maintaining traffic flow</text>
<text x='610' y='339' font-size='11' font-family='monospace' fill='#333'>under a green signal and checking for gaps in</text>
<text x='610' y='354' font-size='11' font-family='monospace' fill='#333'>opposing traffic; after clearing, return to</text>
<text x='610' y='369' font-size='11' font-family='monospace' fill='#333'>the right lane for normal travel.</text>
