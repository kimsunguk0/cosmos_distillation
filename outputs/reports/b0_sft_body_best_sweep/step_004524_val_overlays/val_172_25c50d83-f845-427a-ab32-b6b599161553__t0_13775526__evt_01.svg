<text x='610' y='204' font-size='11' font-family='monospace' fill='#333'>Change lanes to the left and overtake because</text>
<text x='610' y='219' font-size='11' font-family='monospace' fill='#333'>a slow-moving truck is blocking our lane; slow</text>
