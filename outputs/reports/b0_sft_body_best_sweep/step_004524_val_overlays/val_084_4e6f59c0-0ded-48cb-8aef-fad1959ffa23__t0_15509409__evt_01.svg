<text x='610' y='115' font-size='13' font-family='monospace' fill='#111'>student:</text>
<text x='610' y='133' font-size='11' font-family='monospace' fill='#333'>Steer right following temporary traffic</text>
<text x='610' y='148' font-size='11' font-family='monospace' fill='#333'>delineators.</text>
<text x='610' y='173' font-size='13' font-family='monospace' fill='#111'>human:</text>
<text x='610' y='191' font-size='11' font-family='monospace' fill='#333'>Steer right to return to the driving lane</text>
<text x='610' y='206' font-size='11' font-family='monospace' fill='#333'>after passing the lead vehicle ahead.</text>
<text x='610' y='231' font-size='13' font-family='monospace' fill='#111'>teacher:</text>
<text x='610' y='249' font-size='11' font-family='monospace' fill='#333'>Lane change to the left to overtake the slow</text>
<text x='610' y='264' font-size='11' font-family='monospace' fill='#333'>lead vehicle ahead, then merge back right</text>
<text x='610' y='279' font-size='11' font-family='monospace' fill='#333'>after clearing it, due to the lead car</text>
<text x='610' y='294' font-size='11' font-family='monospace' fill='#333'>constraining our lane and a clear opposing</text>
<text x='610' y='309' font-size='11' font-family='monospace' fill='#333'>lane, while accounting for low-visibility,</text>
<text x='610' y='324' font-size='11' font-family='monospace' fill='#333'>slick conditions and an approaching right-side</text>
<text x='610' y='339' font-size='11' font-family='monospace' fill='#333'>junction that makes staying right less</text>
<text x='610' y='354' font-size='11' font-family='monospace' fill='#333'>favorable; then reduce speed for the upcoming</text>
<text x='610' y='369' font-size='11' font-family='monospace' fill='#333'>curve/split after completing the pass.</text>
